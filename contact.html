<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact Us | ResumeByte.in</title>
  <meta name="description" content="Contact ResumeByte team for product support, partnerships, and early access." />
  <link rel="canonical" href="https://resumebyte.in/contact.html" />
  <style>body{font-family:Inter,Arial,sans-serif;max-width:860px;margin:2rem auto;padding:0 1rem;line-height:1.7;color:#0f172a}a{color:#0ea5e9}form{display:grid;gap:.7rem}input,textarea{padding:.6rem;border:1px solid #cbd5e1;border-radius:8px}</style>
</head>
<body>
  <h1>Contact Us</h1>
  <p>We would love to hear from you.</p>
  <ul>
    <li>Email: support@resumebyte.in</li>
    <li>Business inquiries: business@resumebyte.in</li>
  </ul>
  <h2>Send us a message</h2>
  <form action="#" method="post">
    <label for="name">Name</label>
    <input id="name" name="name" type="text" required>
    <label for="email">Email</label>
    <input id="email" name="email" type="email" required>
    <label for="message">Message</label>
    <textarea id="message" name="message" rows="6" required></textarea>
    <button type="submit">Submit</button>
  </form>
  <p><a href="index.html">← Back to home</a></p>
</body>
</html>
